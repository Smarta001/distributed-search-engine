services:
  # ---------------------------------------------------------
  # 1. PostgreSQL: Stores crawled HTML and metadata
  # ---------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: search-postgres
    environment:
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search123
      POSTGRES_DB: distributed_search
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ---------------------------------------------------------
  # 2. RabbitMQ: Message queue linking Crawler to Indexer
  # ---------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI

  # ---------------------------------------------------------
  # 3. Elasticsearch: Stores the BM25-searchable index
  # ---------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disables HTTPS/auth for easier local development
      - ES_JAVA_OPTS=-Xms1g -Xmx1g   # Limits memory usage
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  # ---------------------------------------------------------
  # 4. Crawler: Discovers, fetches, and saves web pages
  # ---------------------------------------------------------
  crawler:
    build:
      context: ../crawler
    container_name: crawler
    depends_on:
      - postgres
      - rabbitmq
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=search
      - POSTGRES_PASSWORD=search123
      - POSTGRES_DB=distributed_search
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest

  # ---------------------------------------------------------
  # 5. Indexer: Consumes RabbitMQ messages and populates ES
  # ---------------------------------------------------------
  indexer:
    build:
      context: ../indexer
    container_name: indexer
    depends_on:
      - rabbitmq
      - elasticsearch
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - ELASTICSEARCH_URL=http://elasticsearch:9200

# ---------------------------------------------------------
# Persistent Volumes
# ---------------------------------------------------------
volumes:
  postgres-data:
  es-data: